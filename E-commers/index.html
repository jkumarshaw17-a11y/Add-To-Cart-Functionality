<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RedCart</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header>
  <h1>🛒 RedCart</h1>
  <div class="cart">
    Cart: <span id="cart-count">0</span>
  </div>
</header>

<section class="products">

  <div class="product">
    <img src="807-8072705_asus-rog-strix-gl504gm-ds74-hero-ii-gaming.png" alt="Product">
    <h2>Product 1</h2>
    <p>$200</p>
    <button onclick="addToCart('Product 1', 200)">Add to Cart</button>
    <button class="buy" onclick="buyNow('Product 1')">Buy Now</button>
  </div>

  <div class="product">
    <img src="download (1).jpg" alt="Product">
    <h2>Product 2</h2>
    <p>$120</p>
    <button onclick="addToCart('Product 2', 120)">Add to Cart</button>
    <button class="buy" onclick="buyNow('Product 2')">Buy Now</button>
  </div>

   <div class="product">
    <img src="download (2).jpg" alt="Product">
    <h2>Product 2</h2>
    <p>$800</p>
    <button onclick="addToCart('Product 2', 800)">Add to Cart</button>
    <button class="buy" onclick="buyNow('Product 2')">Buy Now</button>
  </div>

</section>

<section class="cart-items">
  <h2>Your Cart</h2>
  <ul id="cart-list"></ul>
</section>

<script src="index.js"></script>
</body>
</html>
